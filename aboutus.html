<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eightey — About Us</title>
<link rel="icon" href="assets/logo-placeholder.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Ambient background -->
  <div class="aurora">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
  </div>
  <div class="noise"></div>

  <!-- Floating Nav -->
  <nav class="navbar glass">
    <a href="/" class="nav-logo">
      <img src="assets/logo-placeholder.svg" alt="Eightey logo" class="logo-img" />
      <span class="logo-text">eightey</span>
    </a>
    <div class="nav-links">
      <a href="/#about">About</a>
      <a href="/#services">Services</a>
      <a href="/#projects">Projects</a>
      <a href="aboutus.html">Team</a>
      <a href="/#contact">Contact</a>
    </div>
    <a href="/#contact" class="nav-cta glass-pill">
      <span class="cta-dot"></span>
      Let's talk
    </a>
  </nav>

  <!-- Team -->
  <section class="team-screen">
    <div class="section-head">
      <p class="eyebrow">About Us</p>
      <h2>Meet our team</h2>
    </div>

    <div class="grid grid-2">
      <article class="team-card glass">
        <div class="team-avatar">
          <img src="assets/eightey.png" alt="Eightey avatar" />
        </div>
        <h3>Eightey</h3>
        <p class="team-role">Founder</p>
      </article>

      <article class="team-card glass">
        <div class="team-avatar">
          <img src="assets/avatar-placeholder.svg" alt="Nayyzz avatar" />
        </div>
        <h3>Nayyzz</h3>
        <p class="team-role">Co-Founder</p>
      </article>

      <article class="team-card glass">
        <div class="team-avatar">
          <img src="assets/tanjiro.png" alt="Tanjiro avatar" />
        </div>
        <h3>Tanjiro</h3>
        <p class="team-role">Developer</p>
      </article>

      <article class="team-card glass">
        <div class="team-avatar">
          <img src="assets/leopremm.png" alt="Leopremm avatar" />
        </div>
        <h3>Leopremm</h3>
        <p class="team-role">Developer</p>
      </article>
    </div>

    <div class="contact-panel glass team-contact">
      <p class="eyebrow">Get in Touch</p>
      <h2>Want to work with us?</h2>
      <div class="contact-actions">
        <a href="mailto:eightey@proton.me" class="btn btn-primary glass-pill">eightey@proton.me</a>
        <a href="https://discord.gg/xrCfhbhmh9" class="btn btn-secondary glass-pill" target="_blank" rel="noopener">Join Discord</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>© 2026 Eightey. Built with curiosity and a lot of coffee.</p>
  </footer>

</body>
</html>
